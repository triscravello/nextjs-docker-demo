apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: nextjs-eks-cluster
  region: us-east-1

managedNodeGroups:
  - name: nextjs-eks-nodes
    instanceType: t3.micro  # Changed from t3.medium to match Free Tier restriction
    desiredCapacity: 2
    minSize: 1
    maxSize: 3
    ssh:
      allow: false